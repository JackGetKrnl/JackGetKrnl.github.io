<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark KrnlR</title>
    <style>
        /* General Reset */
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
        }

        /* Background Styling */
        body {
            background: radial-gradient(circle, #000015, #0f0f2f, #1a1a4a);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Navigation Bar */
        .nav {
            display: flex;
            justify-content: center;
            background-color: rgba(0, 0, 0, 0.8);
            width: 100%;
            padding: 10px 0;
            position: fixed;
            top: 0;
            z-index: 10;
        }

        .nav a {
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            padding: 10px 20px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav a:hover {
            color: #ff5733;
        }

        .nav a::after {
            content: '';
            display: block;
            width: 0;
            height: 2px;
            background: #ff5733;
            transition: width 0.3s;
            position: absolute;
            bottom: 0;
            left: 0;
        }

        .nav a:hover::after {
            width: 100%;
        }

        /* Content Styling */
        .content {
            text-align: center;
            margin-top: 80px;
            z-index: 2;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 0 15px #ffffff, 0 0 30px #8000ff, 0 0 60px #ff0080;
            animation: glow 3s infinite alternate;
        }

        @keyframes glow {
            0% { text-shadow: 0 0 15px #ffffff, 0 0 30px #8000ff, 0 0 60px #ff0080; }
            100% { text-shadow: 0 0 25px #ff0080, 0 0 50px #8000ff, 0 0 100px #ffffff; }
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        /* Button Styling */
        .button {
            background: linear-gradient(135deg, #ff5733, #900C3F);
            border: none;
            color: white;
            font-size: 1.2rem;
            padding: 15px 30px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 87, 51, 0.5);
            text-decoration: none;
            position: relative;
        }

        .button:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(255, 87, 51, 0.7);
        }

        /* Background Music */
        #bg-music {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <div class="nav">

    </div>

    <div class="content">

            <a href="https://www.mediafire.com/file/557kcwda6hxtowm/KrnlR.zip/file" class="button" target="_blank">Download</a>
        </div>
    </div>
</body>
</html>
